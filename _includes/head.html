<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ site.description }}">
    
    <!-- Modern CSS Framework -->
    <link rel="stylesheet" href="{{ "/css/custom.css" | prepend: site.baseurl }}">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
</head>

    <script type="text/javascript" src="{{ site.baseurl }}/js/jquery.min.js"></script>
    <script src="{{ site.baseurl }}/js/jquery.nicescroll.min.js"></script>
    <script src="{{ site.baseurl }}/js/jquery.nicescroll.plus.js"></script>
    <script src="{{ site.baseurl }}/js/velocity.min.js"></script>
    <script src="{{ site.baseurl }}/js/skrollr.min.js"></script>
    <script src="{{ site.baseurl }}/js/jquery.scrolline.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/js/modernizr.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/js/materialize.min.js"></script>
    <script type="text/javascript" src="{{ site.baseurl }}/js/main.js"></script>
</head>
